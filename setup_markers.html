<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ARマーカー ダウンロードセンター</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 40px; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 40px; margin-top: 40px; }
        .marker-card { background: #16213e; padding: 20px; border-radius: 12px; }
        .marker-card img { width: 150px; height: 150px; image-rendering: pixelated; }
        p { color: #aaa; max-width: 600px; margin: 0 auto 20px auto; line-height: 1.6; }
        h1 { color: #4caf50; }
        .btn { display: inline-block; margin-top: 10px; padding: 8px 16px; background: #2196f3; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>解答用紙用 ARマーカー</h1>
    <p>以下のマーカー画像を保存し、解答用紙（WordやExcel）の四隅に貼り付けて印刷してください。サイズは自由ですが、<strong>「左上に0、右上に1、左下に2、右下に3」</strong>の配置を守ることで完全自動化と上下逆さま検知が可能になります。</p>
    
    <div class="grid">
        <div class="marker-card">
            <h3>ID: 0 (左上 用)</h3>
            <img src="aruco_markers/marker_id0.png" />
            <br>
            <a href="aruco_markers/marker_id0.png" download class="btn">ダウンロード</a>
        </div>
        <div class="marker-card">
            <h3>ID: 1 (右上 用)</h3>
            <img src="aruco_markers/marker_id1.png" />
            <br>
            <a href="aruco_markers/marker_id1.png" download class="btn">ダウンロード</a>
        </div>
        <div class="marker-card">
            <h3>ID: 2 (左下 用)</h3>
            <img src="aruco_markers/marker_id2.png" />
            <br>
            <a href="aruco_markers/marker_id2.png" download class="btn">ダウンロード</a>
        </div>
        <div class="marker-card">
            <h3>ID: 3 (右下 用)</h3>
            <img src="aruco_markers/marker_id3.png" />
            <br>
            <a href="aruco_markers/marker_id3.png" download class="btn">ダウンロード</a>
        </div>
    </div>
</body>
</html>
