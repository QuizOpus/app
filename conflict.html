<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus - 要確認</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/crypto.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/design_system.css">
    <style>
        body { padding: 24px; }

        .top-bar {
            display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
        }
        .top-bar h1 { font-size: 20px; }

        .counter {
            padding: 6px 16px; border-radius: var(--radius-pill); font-size: 13px;
            font-weight: 600; margin-left: auto;
        }
        .counter.has-conflicts { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
        .counter.all-clear { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

        .conflict-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .conflict-card {
            background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur));
            border-radius: var(--radius-lg); padding: 16px;
            border: 2px solid rgba(245,158,11,0.4);
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            content-visibility: auto; contain-intrinsic-size: 240px 260px;
        }
        .conflict-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .conflict-card.resolved { border-color: rgba(16,185,129,0.4); opacity: 0.6; }
        .conflict-card.selected { box-shadow: 0 0 0 3px var(--primary), 0 0 15px rgba(59,130,246,0.3); }

        .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .q-tag { background: rgba(59,130,246,0.15); color: #60a5fa; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; border: 1px solid rgba(59,130,246,0.3); }
        .entry-tag { background: rgba(148,163,184,0.1); color: var(--text-muted); padding: 4px 10px; border-radius: var(--radius-sm); font-size: 12px; border: 1px solid rgba(148,163,184,0.2); }

        .answer-img { width: 100%; height: 80px; object-fit: contain; background: white; border-radius: var(--radius-sm); margin-bottom: 10px; }

        .model-answer {
            background: rgba(16,185,129,0.15); padding: 6px 10px; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 700; color: #34d399; margin-bottom: 10px; text-align: center;
            border: 1px solid rgba(16,185,129,0.3);
        }

        .scorer-votes { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        .vote-item {
            display: flex; justify-content: space-between; font-size: 12px;
            padding: 5px 8px; border-radius: var(--radius-sm);
            background: rgba(15,23,42,0.6); border: 1px solid var(--glass-border);
        }
        .vote-correct { color: #34d399; font-weight: 700; }
        .vote-wrong { color: #f87171; font-weight: 700; }
        .vote-hold { color: #fbbf24; font-weight: 700; }

        .final-result {
            text-align: center; padding: 8px; border-radius: var(--radius-sm);
            font-size: 16px; font-weight: 800; margin-top: 8px;
        }
        .final-result.correct { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .final-result.wrong { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        .no-conflict { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; font-weight: 600; width: 100%; min-height: 50vh; grid-column: 1 / -1; }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 600; }

        .shortcut-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            padding: 12px 20px; display: flex; gap: 24px;
            justify-content: center; font-size: 13px;
            color: var(--text-muted); z-index: 100; font-weight: 600;
        }
        .shortcut-bar kbd {
            background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px;
            font-family: monospace; font-size: 12px; margin-right: 6px;
            color: white; border: 1px solid rgba(255,255,255,0.2);
        }

        .preview-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            z-index: 1000; display: none; overflow-y: auto; padding: 24px;
        }
        .preview-overlay.show { display: block; animation: fadeIn 0.3s; }
        .preview-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .preview-header h2 { font-size: 18px; }
        .preview-close { background: var(--danger); border: none; color: white; padding: 8px 16px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .preview-grid .pv-item { background: var(--glass-bg); border-radius: var(--radius-md); padding: 8px; text-align: center; border: 1px solid var(--glass-border); }
        .preview-grid .pv-item img { width: 100%; background: white; border-radius: 4px; }
        .preview-grid .pv-item .pv-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body>
    <div class="header-bar">
        <div class="header-left">
            <h1><i class="fa-solid fa-triangle-exclamation"></i> 要確認</h1>
        </div>
        <div class="header-right">
            <div class="counter has-conflicts" id="counter" style="margin-right:12px;"><i class="fa-solid fa-spinner fa-spin-pulse"></i> 読み込み中...</div>
            <div class="admin-dropdown" id="global-menu-container">
                <button class="btn secondary" onclick="document.getElementById('global-menu').classList.toggle('show')">
                    <i class="fa-solid fa-bars"></i> メニュー
                </button>
                <div id="global-menu" class="dropdown-content" style="min-width:220px">
                    <div style="padding: 12px; border-bottom: 1px solid var(--glass-border); margin-bottom: 8px; text-align: center;">
                        <div id="dropdown-scorer-name" style="font-weight: 800; color: var(--text-main); font-size: 15px; margin-bottom: 6px;"></div>
                        <div id="dropdown-scorer-role" class="scorer-badge" style="display:inline-block; padding: 4px 12px;"></div>
                    </div>
                    <button class="btn secondary" onclick="location.href='admin.html'"><i class="fa-solid fa-gauge"></i> 管理画面</button>
                    <button class="btn danger active" onclick="location.href='conflict.html'"><i class="fa-solid fa-triangle-exclamation"></i> 要確認</button>
                    <button class="btn secondary" onclick="location.href='checkin.html'"><i class="fa-solid fa-qrcode"></i> 当日受付</button>
                    <button class="btn secondary" onclick="window.open('entry.html?pid='+projectId,'_blank')"><i class="fa-solid fa-pen-to-square"></i> エントリーフォーム</button>
                    <button class="btn secondary" onclick="window.open('entry_list.html?pid='+projectId,'_blank')"><i class="fa-solid fa-list"></i> エントリーリスト</button>

                    <div style="margin-top:8px; padding-top:8px; border-top:1px solid var(--glass-border)">
                        <button class="btn secondary" onclick="logout()" style="width:100%"><i class="fa-solid fa-right-from-bracket"></i> ログアウト</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="conflict-grid" class="conflict-grid">
        <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> 読み込み中...</div>
    </div>

    <div class="shortcut-bar">
        <span><kbd>M</kbd> <i class="fa-solid fa-circle-check"></i> 正解に確定</span>
        <span><kbd>X</kbd> <i class="fa-solid fa-circle-xmark"></i> 不正解に確定</span>
        <span><kbd>←→↑↓</kbd> <i class="fa-solid fa-arrows-up-down-left-right"></i> 移動</span>
    </div>

    <script src="js/conflict.js"></script>
</body>

</html>
