<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }


        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 20px;
        }

        .scorer-badge {
            background: #0f3460;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn.secondary {
            background: #0f3460;
            border: 1px solid #444;
        }

        .btn.secondary:hover {
            background: #1a4a7a;
        }

        .btn.warning {
            background: #e65100;
        }

        .btn.warning:hover {
            background: #bf360c;
        }

        .admin-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            padding: 12px 16px;
            background: #16213e;
            border-radius: 10px;
            align-items: center;
        }

        .admin-label {
            font-size: 12px;
            color: #aaa;
        }

        .legend {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #aaa;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .q-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .q-card {
            background: #16213e;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            min-height: 90px;
        }

        .q-card:hover:not(.locked) {
            border-color: #4caf50;
        }

        .q-card.locked {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .q-card.mine {
            border-color: #2196f3;
        }

        .q-card.inprogress {
            background: #0d2a5e;
        }

        .q-card.done {
            background: #1b3a1f;
        }

        .q-num {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .q-scorers {
            font-size: 10px;
            color: #aaa;
            line-height: 1.8;
        }

        .q-status {
            font-size: 10px;
            margin-top: 6px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }

        .status-open {
            background: #333;
            color: #888;
        }

        .status-inprogress {
            background: #0d47a1;
            color: #90caf9;
        }

        .status-done {
            background: #1b5e20;
            color: #a5d6a7;
        }

        .status-locked {
            background: #333;
            color: #555;
        }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="top-bar">
        <h1 id="project-title">読み込み中...</h1>
        <div class="scorer-badge" id="scorer-badge"></div>
        <button class="btn secondary" style="margin-left:auto" onclick="logout()">ログアウト</button>
    </div>

    <div class="admin-bar" id="admin-bar" style="display:none">
        <span class="admin-label">管理者：</span>
        <button class="btn secondary" onclick="location.href='admin.html'">管理画面</button>
        <button class="btn secondary" onclick="location.href='checkin.html'">受付</button>
        <button class="btn warning" onclick="location.href='conflict.html'">要確認一覧</button>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot" style="background:#16213e;border:1px solid #444"></div>未着手
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#0d2a5e"></div>採点中
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background:#1b3a1f"></div>完了
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="border:2px solid #2196f3;background:transparent"></div>自分が担当
        </div>
    </div>

    <div class="q-grid" id="q-grid"></div>

    <script src="js/judge.js"></script>
</body>

</html>
