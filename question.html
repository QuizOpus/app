<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizOpus</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding-top: 80px;
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
        }

        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #0f3460;
            border-bottom: 2px solid #2196f3;
            padding: 12px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #4caf50;
            color: white;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn:hover {
            background: #388e3c;
        }

        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: #1a4a7a;
            border: 1px solid #2196f3;
        }

        .btn.secondary:hover {
            background: #1565c0;
        }

        .btn.complete {
            background: #1565c0;
            font-size: 15px;
            padding: 10px 24px;
            margin-left: auto;
        }

        .btn.complete:hover {
            background: #0d47a1;
        }

        .btn.complete.done {
            background: #388e3c;
        }

        .q-badge {
            background: #1a237e;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .answer-badge {
            background: #1b5e20;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #a5d6a7;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-text {
            font-size: 13px;
            color: #aaa;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .answer-card {
            background: #16213e;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 2px solid #444;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            content-visibility: auto;
            contain-intrinsic-size: 160px 120px;
        }

        .answer-card.correct {
            border-color: #4caf50;
            background: #1b3a1f;
        }

        .answer-card.wrong {
            border-color: #ef5350;
            background: #3a1b1b;
        }

        .answer-card.hold {
            border-color: #ff9800;
            background: #3a2b1b;
        }

        .answer-card img {
            width: 100%;
            height: 70px;
            object-fit: contain;
            border-radius: 4px;
            background: white;
            margin-bottom: 8px;
        }

        .entry-num {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
        }

        .answer-card.selected {
            box-shadow: 0 0 0 3px #2196f3, 0 0 12px rgba(33, 150, 243, 0.3);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .shortcut-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f3460;
            border-top: 1px solid #444;
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 12px;
            color: #90caf9;
            z-index: 100;
        }
        .shortcut-bar kbd {
            background: #1a237e;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            margin-right: 4px;
        }
        .preview-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;overflow-y:auto;padding:20px; }
        .preview-overlay.show { display:block; }
        .preview-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:16px; }
        .preview-header h2 { font-size:18px; }
        .preview-close { background:#c62828;border:none;color:white;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px; }
        .preview-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px; }
        .preview-grid .pv-item { background:#16213e;border-radius:8px;padding:8px;text-align:center; }
        .preview-grid .pv-item img { width:100%;background:white;border-radius:4px; }
        .preview-grid .pv-item .pv-label { font-size:12px;color:#aaa;margin-top:4px; }
    </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="fixed-header">
        <button class="btn secondary" onclick="location.href='judge.html'">← 一覧へ</button>
        <div class="q-badge" id="q-badge">- 問</div>
        <div class="answer-badge" id="answer-badge">...</div>
        <div class="progress-text" id="progress-text"></div>
    </div>

    <div class="answer-grid" id="answer-grid">
        <div class="loading">読み込み中...</div>
    </div>

    <div class="shortcut-bar">
        <span><kbd>M</kbd> 正解</span>
        <span><kbd>X</kbd> 不正解</span>
        <span><kbd>H</kbd> 保留</span>
        <span><kbd>←→↑↓</kbd> 移動</span>
    </div>

    <script src="js/question.js"></script>
</body>

</html>
